<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Crear Anuncio</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout :: layout(~{::content})}">
    <div th:fragment="content">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>📰 Crear Nuevo Anuncio</h3>
            <a class="btn btn-secondary" th:href="@{/anuncios}">↩️ Volver</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10 col-xl-8">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Detalles de Publicación</h5>
                    </div>
                    <div class="card-body">
                        <form id="anuncioForm" th:action="@{/anuncios}" th:object="${anuncio}" method="post">

                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <label for="titulo" class="form-label">Título del Anuncio (*)</label>
                                    <input type="text" th:field="*{titulo}" th:classappend="${#fields.hasErrors('titulo')} ? 'is-invalid' : ''"
                                           class="form-control" id="titulo" required>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}">
                                        Error en el título
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <label class="form-label">Contenido (*)</label>
                                    <div id="editor-container" style="height: 300px; background-color: white;">
                                        <div th:utext="*{contenido}"></div>
                                    </div>
                                    <input type="hidden" th:field="*{contenido}" id="contenido-hidden">
                                    <p th:if="${#fields.hasErrors('contenido')}" th:errors="*{contenido}" class="text-danger small"></p>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="tipoId" class="form-label">Tipo de Anuncio (*)</label>
                                    <select th:field="*{tipoId}" class="form-select" id="tipoId" required>
                                        <option value="">-- Seleccione un Tipo --</option>
                                        <option th:each="tipo : ${tipos}"
                                                th:value="${tipo.id}"
                                                th:text="${tipo.tipo != null ? tipo.tipo : (tipo.descripcion != null ? tipo.descripcion : '[Sin nombre]')}">
                                        </option>
                                    </select>
                                    <p th:if="${#fields.hasErrors('tipoId')}" th:errors="*{tipoId}" class="text-danger"></p>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="duracionDesde" class="form-label">Desde</label>
                                    <input type="datetime-local" th:field="*{duracionDesde}" class="form-control" id="duracionDesde">
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="duracionHasta" class="form-label">Hasta</label>
                                    <input type="datetime-local" th:field="*{duracionHasta}" class="form-control" id="duracionHasta">
                                </div>
                            </div>

                            <hr/>

                            <h5 class="mb-3">🎯 Targeting a Graduados</h5>
                            <p class="text-muted small">Selecciona las **Carreras** cuyos graduados recibirán esta notificación.</p>

                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <label for="facultadFilter" class="form-label">Filtrar Carreras por Facultad</label>
                                    <select id="facultadFilter" class="form-select">
                                        <option value="">Todas las Facultades</option>
                                        <option th:each="facultad : ${facultades}"
                                                th:value="${facultad.id}"
                                                th:text="${facultad.nombre != null ? facultad.nombre : '[Nombre Nulo]'}">
                                        </option>
                                    </select>
                                </div>

                                <div class="col-md-12 mb-4 form-group">
                                    <label class="form-label">Carreras Destino (*)</label>
                                    <div id="carrerasCheckboxes" class="border p-3 rounded bg-light" style="max-height: 250px; overflow-y: scroll;">
                                        <div th:each="carrera : ${carreras}" class="form-check">
                                            <input class="form-check-input carrera-checkbox"
                                                   type="checkbox"
                                                   th:field="*{carrerasIds}"
                                                   th:value="${carrera.id}"
                                                   th:id="'carrera-' + ${carrera.id}"
                                                   th:data-facultad-id="${carrera.facultad != null ? carrera.facultad.id : 0}">
                                            <label class="form-check-label" th:for="'carrera-' + ${carrera.id}">
                                                <span th:text="${carrera.nombre != null ? carrera.nombre : '[Carrera sin nombre]'}"></span>
                                                <small class="text-muted" th:text="${carrera.facultad != null ?
                                                    '(' + (carrera.facultad.nombre != null ? carrera.facultad.nombre : 'Sin Nombre') + ')'
                                                    : '(Sin Facultad Asignada)'}">
                                                </small>
                                            </label>
                                        </div>
                                    </div>
                                    <p th:if="${#fields.hasErrors('carrerasIds')}" th:errors="*{carrerasIds}" class="text-danger"></p>
                                </div>
                            </div>

                            <hr/>
                            <h5 class="mb-3">Contacto y Ubicación</h5>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="lugar" class="form-label">Lugar / Ciudad</label>
                                    <input type="text" th:field="*{lugar}" class="form-control" id="lugar">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="mailContacto" class="form-label">Email de Contacto</label>
                                    <input type="email" th:field="*{mailContacto}" class="form-control" id="mailContacto">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="telefonoContacto" class="form-label">Teléfono de Contacto</label>
                                    <input type="number" th:field="*{telefonoContacto}" class="form-control" id="telefonoContacto">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="especializaciones" class="form-label">Especializaciones Requeridas (Opcional)</label>
                                    <input type="text" th:field="*{especializaciones}" class="form-control" id="especializaciones" placeholder="Ej: Redes, Desarrollo Mobile">
                                </div>
                            </div>

                            <div class="mt-2">
                                <small class="text-muted">(*) Campos obligatorios</small>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a th:href="@{/anuncios}" class="btn btn-outline-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">
                                    🚀 Guardar y Enviar Anuncio
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {

        // --- 1. Lógica de Filtros de Carreras ---
        const facultadFilter = document.getElementById('facultadFilter');
        const carrerasCheckboxes = document.getElementById('carrerasCheckboxes');
        const checkboxes = carrerasCheckboxes ? carrerasCheckboxes.querySelectorAll('.carrera-checkbox') : [];

        if (facultadFilter) {
            facultadFilter.addEventListener('change', function () {
                const selectedFacultadId = facultadFilter.value;
                checkboxes.forEach(function (checkbox) {
                    const row = checkbox.closest('.form-check');
                    const carreraFacultadId = checkbox.dataset.facultadId;
                    row.style.display = (selectedFacultadId === '' || carreraFacultadId === selectedFacultadId)
                        ? 'block' : 'none';
                });
            });
        }

        // --- 2. Configuración del Editor Quill ---
        var quill = new Quill('#editor-container', {
            theme: 'snow',
            placeholder: 'Redacta el anuncio aquí...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }], // encabezados
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }], // Colores de texto
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['link', 'image', 'clean'] // <---  'image'
                ]
            }
        });

        // --- 3. Manejo del Envío del Formulario (Sincronización + Validación + Confirmación) ---
        var form = document.getElementById('anuncioForm');

        form.onsubmit = function(e) {
            var inputContenido = document.getElementById('contenido-hidden');

            // A. Sincronizar: Pasar el HTML actual de Quill al input de Spring
            var htmlDeQuill = quill.root.innerHTML;
            inputContenido.value = htmlDeQuill;

            // B. Validar si el texto está realmente vacío (sin contar etiquetas HTML)
            if (quill.getText().trim().length === 0) {
                alert("El contenido del anuncio no puede estar vacío.");
                return false;
            }

            // C. Confirmación Final
            var msg = '¿Estás seguro? Se enviará un correo a todos los graduados de las carreras seleccionadas.';
            if (!confirm(msg)) {
                return false;
            }

            return true; // Si todo está ok, se envía el formulario
        };
    });
</script>

</body>
</html>
