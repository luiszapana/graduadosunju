# Base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/GRADUADOSUNJU
spring.datasource.username=GRADUADOSUNJU
spring.datasource.password=GRADUADOSUNJU
# Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database=POSTGRESQL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# Establece el dialecto a una cadena vacía o nula. Esto instruye a Spring a no configurar la propiedad 'hibernate.dialect' en absoluto.
spring.jpa.database-platform=
spring.jpa.open-in-view=false

server.port=8080
# Puerto de PROD
#server.port=443

# El archivo de configuracion SSL, keystore.p12, se obtuvo de los dos archivos enviados por German Jerez:
